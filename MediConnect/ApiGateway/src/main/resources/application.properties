spring.application.name=API-GATEWAY

server.port=8080

eureka.client.service-url.defaultZone=http://localhost:8761/eureka

# Doctor Service Route
spring.cloud.gateway.routes[0].id=doctor-service
spring.cloud.gateway.routes[0].uri=lb://DOCTORMANAGEMENT-SERVICE
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/doctors/**

# Appointment Service Route
spring.cloud.gateway.routes[1].id=appointment-service
spring.cloud.gateway.routes[1].uri=lb://APPOINTMENTMANAGEMENT-SERVICE
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/appointments/**